<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<script>
  (function(){
    try {
      var CLAVE = "peke-ari-tema";
      var guardado = localStorage.getItem(CLAVE);
      var prefiereOscuro = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (guardado === "oscuro" || (!guardado && prefiereOscuro)) {
        document.documentElement.setAttribute("data-tema", "oscuro");
      }
    } catch (e) {}
  })();
</script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión | PEKE-ARI</title>
<meta name="description" content="Inicio de sesión del panel interno de PEKE-ARI.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="img/logo/logotipo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/darkmode.css">
<link rel="stylesheet" href="css/mejoras.css">
<link rel="stylesheet" href="css/login.css">
<link rel="stylesheet" href="css/responsive.css">

</head>
<body class="pagina-login">

<header id="navBar" class="navbar-simple">
  <nav class="nav-contenedor">
    <a href="index.html" class="nav-logo">
      <img src="img/logo/panda.png" alt="Logotipo PEKE-ARI">
      <span>PEKE-ARI</span>
    </a>
    <div class="nav-herramientas">
      <a href="index.html" class="btn btn-secundario btn-pequeno">
        <i class="fa-solid fa-arrow-left"></i> Volver al sitio
      </a>
      <button id="btnModoOscuro" aria-label="Cambiar modo oscuro">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>
  </nav>
</header>

<main class="login-panel">
  <div class="login-tarjeta login-animar-entrada">

    <div class="login-encabezado">
      <img src="img/logo/panda.png" alt="Logotipo PEKE-ARI" class="login-logo">
      <h1>Panel interno</h1>
      <p>Inicia sesión para ver las estadísticas de visitas.</p>
    </div>

    <!-- Formulario de login: envía a /api/login (server/routes/auth.js).
         Protegido con rate limiting (máx. 8 intentos / 15 min por IP)
         y comparación de credenciales en tiempo constante. -->
    <form id="formLogin" class="login-formulario" novalidate>

      <div class="campo-contacto">
        <label for="loginUsuario">Usuario</label>
        <div class="login-input-icono">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="loginUsuario" name="usuario" placeholder="Tu usuario" required maxlength="60" autocomplete="username">
        </div>
      </div>

      <div class="campo-contacto">
        <label for="loginContrasena">Contraseña</label>
        <div class="login-input-icono">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="loginContrasena" name="contrasena" placeholder="Tu contraseña" required maxlength="200" autocomplete="current-password">
          <button type="button" id="btnMostrarPassword" class="login-mostrar-password" aria-label="Mostrar contraseña" tabindex="-1">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primario login-btn-ingresar">
        <span class="login-btn-texto">Ingresar</span>
        <i class="fa-solid fa-spinner fa-spin login-btn-cargando" hidden></i>
      </button>

      <p class="login-mensaje-error" id="loginMensajeError" role="alert"></p>

    </form>

  </div>
</main>

<script src="js/darkmode.js" defer></script>
<script src="js/login.js" defer></script>

</body>
</html>
